<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login Page</title>
    <style>
       body { font-family: 'Poppins', sans-serif; }
        .bg-accent-orange { background-color: #FF9335; }
        .text-accent-purple { color: #8A38F5; }
        .bg-light-yellow { background-color: #FFD47E; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="flex flex-col md:flex-row w-full max-w-5xl bg-white rounded-xl shadow-2xl overflow-hidden min-h-[600px]">
        
        <div class="md:w-1/2 bg-[#8A38F5] p-12 flex flex-col justify-center text-white relative">
            <h1 class="text-5xl font-bold mb-6 leading-tight">BZme Login
            </h1>
            
            <div class="my-8 flex justify-center">
                <img src="image/2.png" alt="Illustration" class="w-64 h-64 object-contain">
            </div>

            <p class="text-lg opacity-90 leading-relaxed max-w-md">
                <p>Unlock your professional potential. Learn from industry leaders and stay ahead of the competition.</p>
            </p>
        </div>

        <div class="md:w-1/2 bg-[#FFD47E] p-12 flex flex-col justify-center items-center">
            <div class="w-full max-w-sm">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-wide">Login Page</h2>
                    <p class="text-sm text-gray-500 mt-1">Masukkan Username dan Password Anda</p>
                </div>

                <form class="space-y-4">
                    <div>
                        <input type="email"  id="email"
                               placeholder="Email Address" 
                               class="w-full px-5 py-3 rounded-lg border border-transparent bg-white text-[#5d71c3] placeholder-[#5d71c3] focus:outline-none focus:ring-2 focus:ring-[#5d71c3] shadow-sm transition-all">
                    </div>

                    <div>
                        <input type="password" id="password"
                               placeholder="Password" 
                               class="w-full px-5 py-3 rounded-lg border border-transparent bg-white text-[#5d71c3] placeholder-[#5d71c3] focus:outline-none focus:ring-2 focus:ring-[#5d71c3] shadow-sm transition-all"
                        >
                    </div>

                    <button type="button" id="submit"
                            class="w-full bg-[#FF9335] hover:bg-[#8A38F5] text-white font-semibold py-3 rounded-lg shadow-md transition duration-300">
                        Login
                    </button>
        </div>  
    </div>
<script src="external.js"></script>
</body>
</html>
