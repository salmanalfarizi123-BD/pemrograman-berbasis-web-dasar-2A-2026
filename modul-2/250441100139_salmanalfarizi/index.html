<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis_store - Premium T-Shirt</title>
    <link rel="stylesheet" href="style.css">
<body>
    <nav class="navbar">
        <div class="logo">OASIS.<span>Store</span></div>
            
        <ul class="nav-links">
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Koleksi</a></li>
            <li><a href="#">Tentang Kami</a></li>
        </ul>
    </nav>

    <main class="kotak">
        <div class="product-card">
            <div class="product-image">
                <img src="gambar/oasis.jpg" alt="Premium black T-shirt">
            </div>
            
            
            <div class="product-details">
                <span class="category">Koleksi terbaru</span>
                <h1>Voll.2 Oasis T-Shirt</h1>
                <p class="price">Rp 100.000</p>
                
                <p class="description">
                    Dibuat dari 100% Bahan Cotton combat untuk kenyamanan maksimal sepanjang hari. Potongan modern yang pas di badan, memberikan kesan rapi namun tetap santai.
                </p>

                <div class="options">
                    <div class="size-selection">
                        <h4>Ukuran</h4>
                        <div class="sizes">
                            <span class="size">S</span>
                            <span class="size">M</span>
                            <span class="size">L</span>
                            <span class="size">XL</span>
                        </div>
                    </div>
                </div>

                <button class="buy-btn">Tambah ke Keranjang</button>
            </div>
        </div>
    </main>

</body>
</html>
